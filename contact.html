<!DOCTYPE html>
<html lang="en">
<head>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 50px 20px;
}

h1 {
  font-size: 35px;
}

p {
  color: #cbd5f5;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CONTACT CARDS */
.contact-grid {
  display: grid;
  gap: 20px;
}

.contact-card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
  transition: 0.3s;
}

.contact-card i {
  font-size: 22px;
  padding: 12px;
  border-radius: 50%;
}

.contact-card:hover {
  transform: translateY(-5px);
}

/* COLORS */
.phone i { background:#22c55e; }
.email i { background:#3b82f6; }
.whatsapp i { background:#25D366; }
.linkedin i { background:#0A66C2; }

/* FORM */
form {
  margin-top: 30px;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 25px;
  background: #d4af37;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.8;
}

/* SOCIAL */
.socials {
  text-align: center;
  margin-top: 30px;
}

.socials a {
  margin: 10px;
  font-size: 22px;
  color: white;
  background: #1e293b;
  padding: 12px;
  border-radius: 50%;
  display: inline-block;
  transition: 0.3s;
}

.socials a:hover {
  transform: scale(1.2);
}

footer {
  text-align: center;
  padding: 20px;
  color: gray;
  margin-top: 40px;
}
</style>
</head>

  <a href="https://wa.me/2349158689138" target="_blank" class="contact-card whatsapp">

  <a href="https://www.linkedin.com/in/oluwatobi-akeem-4b16462b1" target="_blank" class="contact-card linkedin">
